<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Know-It-All — Playing</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0a0a0f; --surface:#12121a; --border:#1e1e2e; --accent:#7c5cfc; --accent2:#c084fc; --text:#e2e0ff; --muted:#6b6a8a; --success:#4ade80; --error:#f87171; --warn:#fbbf24; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
        nav { display:flex; align-items:center; justify-content:space-between; padding:12px 40px; border-bottom:1px solid var(--border); background:rgba(10,10,15,0.9); backdrop-filter:blur(10px); }
        .logo { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .nav-center { display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:5px 14px; font-size:13px; color:var(--muted); }
        .nav-center span { color:var(--text); font-weight:600; }
        .nav-stats { display:flex; gap:24px; }
        .ns { text-align:center; }
        .ns-val { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .ns-lbl { font-size:10px; color:var(--muted); }
        .btn-sm { background:transparent; border:1px solid var(--border); color:var(--muted); padding:6px 14px; border-radius:8px; cursor:pointer; font-size:12px; font-family:inherit; transition:all 0.2s; }
        .btn-sm:hover { border-color:var(--error); color:var(--error); }
        main { max-width:680px; margin:0 auto; padding:36px 24px; }
        .timer-bar { height:3px; background:var(--border); border-radius:3px; margin-bottom:6px; }
        .timer-fill { height:100%; border-radius:3px; transition:width 1s linear, background 0.4s; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
        .timer-fill.warn   { background:linear-gradient(90deg,var(--warn),#f59e0b); }
        .timer-fill.danger { background:var(--error); }
        .timer-text { text-align:right; font-size:12px; color:var(--muted); margin-bottom:24px; }
        .q-meta { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px; }
        .q-text { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; line-height:1.45; margin-bottom:28px; }

        /* Answer input */
        .answer-box { display:flex; gap:10px; margin-bottom:20px; }
        .answer-input { flex:1; background:var(--surface); border:2px solid var(--border); border-radius:12px; padding:14px 18px; color:var(--text); font-size:16px; font-family:'DM Sans',sans-serif; outline:none; transition:border-color 0.2s; }
        .answer-input:focus { border-color:var(--accent); }
        .answer-input:disabled { opacity:0.5; cursor:not-allowed; }
        .answer-input.correct { border-color:var(--success); background:rgba(74,222,128,0.05); }
        .answer-input.wrong   { border-color:var(--error);   background:rgba(248,113,113,0.05); }
        .btn-submit { padding:14px 24px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:12px; color:#fff; font-size:15px; font-weight:700; font-family:'Syne',sans-serif; cursor:pointer; transition:opacity 0.2s; white-space:nowrap; }
        .btn-submit:hover { opacity:0.9; }
        .btn-submit:disabled { opacity:0.4; cursor:not-allowed; }

        .result { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:16px; display:none; animation:slideIn 0.25s ease; }
        @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .result-head { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
        .result-icon  { font-size:24px; }
        .result-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; }
        .result-pts   { font-size:13px; color:var(--accent2); }
        .result-correct { font-size:13px; color:var(--muted); margin-bottom:10px; }
        .result-correct strong { color:var(--success); }
        .bd-title { font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); margin-bottom:8px; }
        .bd-item { display:flex; gap:8px; font-size:13px; background:rgba(248,113,113,0.05); border:1px solid rgba(248,113,113,0.15); border-radius:8px; padding:8px 12px; margin-bottom:6px; }
        .bd-item::before { content:'→'; color:var(--error); flex-shrink:0; }

        .btn-next { width:100%; padding:13px; background:var(--surface); border:1px solid var(--border); border-radius:11px; color:var(--text); font-size:14px; font-weight:600; font-family:'Syne',sans-serif; cursor:pointer; transition:border-color 0.2s; display:none; }
        .btn-next:hover { border-color:var(--accent); }
        .loading { text-align:center; padding:60px; color:var(--muted); }
        .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 14px; }
        @keyframes spin { to{transform:rotate(360deg)} }
    </style>
</head>
<body>
<nav>
    <div class="logo">⚡ Know-It-All</div>
    <div class="nav-center" id="providerBadge">🤖 <span id="providerName">AI</span></div>
    <div class="nav-stats">
        <div class="ns"><div class="ns-val" id="nScore">0</div><div class="ns-lbl">Score</div></div>
        <div class="ns"><div class="ns-val" id="nQ">0</div><div class="ns-lbl">Questions</div></div>
        <div class="ns"><div class="ns-val" id="nC">0</div><div class="ns-lbl">Correct</div></div>
    </div>
    <button class="btn-sm" onclick="endGame()">End Game</button>
</nav>

<main>
    <div id="loadView" class="loading">
        <div class="spinner"></div>
        <div>Generating question...</div>
    </div>
    <div id="gameView" style="display:none">
        <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
        <div class="timer-text"><span id="timerNum">—</span>s left</div>

        <div class="q-meta"  id="qMeta"></div>
        <div class="q-text"  id="qText"></div>

        <div class="answer-box">
            <input class="answer-input" id="answerInput" type="text"
                   placeholder="Type your answer here..."
                   onkeydown="if(event.key==='Enter') submit()"/>
            <button class="btn-submit" id="btnSubmit" onclick="submit()">Submit</button>
        </div>

        <div class="result" id="result">
            <div class="result-head">
                <div class="result-icon"  id="rIcon"></div>
                <div>
                    <div class="result-title" id="rTitle"></div>
                    <div class="result-pts"   id="rPts"></div>
                </div>
            </div>
            <div class="result-correct" id="rCorrect"></div>
            <div id="breakdown"></div>
        </div>
        <button class="btn-next" id="btnNext" onclick="next()">Next Question →</button>
    </div>
</main>

<script>
    const token    = localStorage.getItem('token');
    if (!token) location.href = '/index.html';
    const topic    = localStorage.getItem('gameTopic');
    const difficulty = parseInt(localStorage.getItem('gameDiff') || '5');
    const provider = localStorage.getItem('gameProvider') || 'GEMINI';
    if (!topic) location.href = '/dashboard.html';

    const icons = { GEMINI:'🔵', GROQ:'⚡', COHERE:'🟠' };
    document.getElementById('providerName').textContent = provider;
    document.getElementById('providerBadge').innerHTML =
        `${icons[provider]||'🤖'} <span>${provider}</span>`;

    let sessionId, currentQ, score=0, qCount=0, correct=0, timer, timeLimit, timeLeft;

    async function api(path, opts={}) {
        const res = await fetch(path, {
            ...opts,
            headers: {'Authorization':'Bearer '+token, 'Content-Type':'application/json', ...(opts.headers||{})}
        });
        return res.json();
    }

    async function init() {
        const s = await api('/api/game/start', {
            method: 'POST',
            body: JSON.stringify({ topic, difficulty, aiProvider: provider })
        });
        if (s.error) { alert(s.error); location.href='/dashboard.html'; return; }
        sessionId = s.sessionId;
        next();
    }

    async function next() {
        show(false);
        clearInterval(timer);

        document.getElementById('answerInput').value = '';
        document.getElementById('answerInput').disabled = false;
        document.getElementById('answerInput').className = 'answer-input';
        document.getElementById('btnSubmit').disabled = false;
        document.getElementById('btnNext').style.display = 'none';
        document.getElementById('result').style.display = 'none';

        const q = await api(`/api/game/${sessionId}/question`);
        if (q.error) { alert(q.error); return; }
        currentQ = q;
        qCount++;
        timeLimit = q.timeLimitSeconds || 30;
        timeLeft  = timeLimit;

        document.getElementById('qMeta').textContent =
            `Question ${qCount} · ${topic} · Difficulty ${difficulty}/10`;
        document.getElementById('qText').textContent = q.questionText;

        updateStats();
        show(true);
        startTimer();
        document.getElementById('answerInput').focus();
    }

    async function submit() {
        const userAnswer = document.getElementById('answerInput').value.trim();
        if (!userAnswer) return;

        clearInterval(timer);
        const taken = timeLimit - timeLeft;

        document.getElementById('answerInput').disabled = true;
        document.getElementById('btnSubmit').disabled = true;

        const r = await api(`/api/game/${sessionId}/answer`, {
            method: 'POST',
            body: JSON.stringify({ questionId: currentQ.questionId, userAnswer, timeTakenSeconds: taken })
        });

        document.getElementById('answerInput').classList.add(r.correct ? 'correct' : 'wrong');

        score = r.currentScore;
        if (r.correct) correct++;
        updateStats();

        document.getElementById('rIcon').textContent  = r.correct ? '🎉' : '❌';
        document.getElementById('rTitle').textContent = r.correct ? 'Correct!' : 'Not quite!';
        document.getElementById('rPts').textContent   = r.correct ? `+${r.pointsEarned} points` : '';
        document.getElementById('rCorrect').innerHTML =
            r.correct ? '' : `Correct answer: <strong>${r.correctAnswer}</strong>`;

        const bd = document.getElementById('breakdown');
        if (!r.correct && r.breakdown?.length) {
            bd.innerHTML = `<div class="bd-title">Why you were wrong:</div>` +
                r.breakdown.map(x => `<div class="bd-item">${x}</div>`).join('');
        } else { bd.innerHTML = ''; }

        document.getElementById('result').style.display = 'block';
        document.getElementById('btnNext').style.display = 'block';
    }

    function startTimer() {
        updateTimer();
        timer = setInterval(() => {
            timeLeft--;
            updateTimer();
            if (timeLeft <= 0) {
                clearInterval(timer);
                // Auto-submit with whatever is typed (or empty = wrong)
                const val = document.getElementById('answerInput').value.trim();
                if (!document.getElementById('btnSubmit').disabled) {
                    document.getElementById('answerInput').value = val || '(no answer)';
                    submit();
                }
            }
        }, 1000);
    }

    function updateTimer() {
        const pct = (timeLeft / timeLimit) * 100;
        const fill = document.getElementById('timerFill');
        fill.style.width = pct + '%';
        fill.className = 'timer-fill' + (pct<25?' danger':pct<50?' warn':'');
        document.getElementById('timerNum').textContent = timeLeft;
    }

    function updateStats() {
        document.getElementById('nScore').textContent = score;
        document.getElementById('nQ').textContent = qCount;
        document.getElementById('nC').textContent = correct;
    }

    function show(game) {
        document.getElementById('loadView').style.display = game ? 'none' : 'block';
        document.getElementById('gameView').style.display = game ? 'block' : 'none';
    }

    async function endGame() {
        if (!confirm('End game and see your results?')) return;
        clearInterval(timer);
        await api(`/api/game/${sessionId}/end`, { method: 'POST' });
        localStorage.setItem('viewSession', sessionId);
        location.href = '/history.html';
    }

    init();
</script>
</body>
</html>

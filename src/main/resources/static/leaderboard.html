<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Know-It-All — Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0a0a0f; --surface:#12121a; --border:#1e1e2e; --accent:#7c5cfc; --accent2:#c084fc; --text:#e2e0ff; --muted:#6b6a8a; --success:#4ade80; --error:#f87171; --warn:#fbbf24; --gold:#fbbf24; --silver:#94a3b8; --bronze:#c97c4a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

        /* Subtle top glow */
        body::before { content:''; position:fixed; top:0; left:0; right:0; height:320px; background:radial-gradient(ellipse 70% 40% at 50% -10%, rgba(124,92,252,0.15) 0%, transparent 70%); pointer-events:none; z-index:0; }

        nav { display:flex; align-items:center; justify-content:space-between; padding:14px 40px; border-bottom:1px solid var(--border); background:rgba(10,10,15,0.9); backdrop-filter:blur(10px); position:sticky; top:0; z-index:10; }
        .logo { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .nav-right { display:flex; align-items:center; gap:10px; }
        .btn-sm { background:transparent; border:1px solid var(--border); color:var(--muted); padding:6px 14px; border-radius:8px; cursor:pointer; font-size:13px; font-family:inherit; transition:all 0.2s; }
        .btn-sm:hover { border-color:var(--accent); color:var(--accent); }
        .btn-sm.danger:hover { border-color:var(--error); color:var(--error); }

        main { max-width:760px; margin:0 auto; padding:40px 24px; position:relative; z-index:1; }

        .page-header { text-align:center; margin-bottom:40px; }
        .trophy { font-size:40px; margin-bottom:10px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
        h1 { font-family:'Syne',sans-serif; font-size:32px; font-weight:800; margin-bottom:6px; }
        h1 span { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .page-sub { color:var(--muted); font-size:14px; }

        /* Top 3 podium cards */
        .podium { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:32px; }
        .podium-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px 14px; text-align:center; position:relative; overflow:hidden; transition:transform 0.2s; }
        .podium-card:hover { transform:translateY(-2px); }
        .podium-card::before { content:''; position:absolute; inset:0; opacity:0; transition:opacity 0.2s; }
        .podium-card.gold   { border-color:rgba(251,191,36,0.35); }
        .podium-card.gold::before   { background:radial-gradient(ellipse at 50% 0%, rgba(251,191,36,0.08) 0%, transparent 70%); opacity:1; }
        .podium-card.silver { border-color:rgba(148,163,184,0.3); }
        .podium-card.silver::before { background:radial-gradient(ellipse at 50% 0%, rgba(148,163,184,0.06) 0%, transparent 70%); opacity:1; }
        .podium-card.bronze { border-color:rgba(201,124,74,0.3); }
        .podium-card.bronze::before { background:radial-gradient(ellipse at 50% 0%, rgba(201,124,74,0.06) 0%, transparent 70%); opacity:1; }
        .podium-rank { font-size:28px; margin-bottom:8px; }
        .podium-name { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .podium-name.you { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .podium-score { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; }
        .podium-score.gold   { color:var(--gold); }
        .podium-score.silver { color:var(--silver); }
        .podium-score.bronze { color:var(--bronze); }
        .podium-games { font-size:11px; color:var(--muted); margin-top:4px; }
        .podium-you-badge { display:inline-block; font-size:9px; font-weight:700; padding:1px 7px; border-radius:20px; background:rgba(124,92,252,0.15); color:var(--accent2); border:1px solid rgba(124,92,252,0.25); margin-top:6px; letter-spacing:0.04em; text-transform:uppercase; }

        /* Full table */
        .table-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; overflow:hidden; }
        .table-head { display:grid; grid-template-columns:56px 1fr 140px 120px; padding:12px 20px; border-bottom:1px solid var(--border); }
        .th { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; font-weight:600; }
        .th.right { text-align:right; }

        .table-row { display:grid; grid-template-columns:56px 1fr 140px 120px; padding:14px 20px; border-bottom:1px solid var(--border); align-items:center; transition:background 0.15s; }
        .table-row:last-child { border-bottom:none; }
        .table-row:hover { background:rgba(124,92,252,0.04); }
        .table-row.me { background:rgba(124,92,252,0.06); }
        .table-row.me:hover { background:rgba(124,92,252,0.1); }

        .rank-cell { display:flex; align-items:center; }
        .rank-num { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; color:var(--muted); width:28px; }
        .rank-medal { font-size:18px; }

        .user-cell { display:flex; align-items:center; gap:10px; }
        .avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-size:13px; font-weight:800; color:#fff; flex-shrink:0; }
        .username { font-weight:600; font-size:14px; }
        .you-tag { display:inline-block; font-size:9px; font-weight:700; padding:1px 6px; border-radius:20px; background:rgba(124,92,252,0.12); color:var(--accent2); border:1px solid rgba(124,92,252,0.2); margin-left:7px; vertical-align:middle; text-transform:uppercase; letter-spacing:0.04em; }

        .score-cell { text-align:right; font-family:'Syne',sans-serif; font-size:15px; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .games-cell { text-align:right; font-size:13px; color:var(--muted); }

        .loading { text-align:center; padding:60px; color:var(--muted); }
        .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 14px; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .empty { text-align:center; color:var(--muted); padding:48px; font-size:14px; }

        /* My rank banner — shown if user is outside top 10 */
        .my-rank-banner { background:rgba(124,92,252,0.08); border:1px solid rgba(124,92,252,0.2); border-radius:12px; padding:14px 20px; margin-top:16px; display:flex; justify-content:space-between; align-items:center; }
        .my-rank-banner .label { font-size:13px; color:var(--muted); }
        .my-rank-banner .val   { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

        /* Fade-in rows */
        .table-row { animation: fadeUp 0.3s ease both; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>
<body>
<nav>
    <div class="logo">⚡ Know-It-All</div>
    <div class="nav-right">
        <button class="btn-sm" onclick="location.href='/dashboard.html'">← Dashboard</button>
        <button class="btn-sm danger" onclick="logout()">Sign Out</button>
    </div>
</nav>

<main>
    <div class="page-header">
        <div class="trophy">🏆</div>
        <h1>Global <span>Leaderboard</span></h1>
        <div class="page-sub">Top players ranked by total score</div>
    </div>

    <div id="loadView" class="loading">
        <div class="spinner"></div>
        <div>Loading rankings...</div>
    </div>

    <div id="mainView" style="display:none">
        <!-- Top 3 podium -->
        <div class="podium" id="podium"></div>

        <!-- Full ranked table -->
        <div class="table-card">
            <div class="table-head">
                <div class="th">Rank</div>
                <div class="th">Player</div>
                <div class="th right">Score</div>
                <div class="th right">Games</div>
            </div>
            <div id="tableBody"></div>
        </div>

        <!-- My rank if outside visible range -->
        <div class="my-rank-banner" id="myRankBanner" style="display:none">
            <div class="label">Your ranking</div>
            <div id="myRankInfo" class="val"></div>
        </div>
    </div>
</main>

<script>
    const token    = localStorage.getItem('token');
    if (!token) location.href = '/index.html';
    const username = localStorage.getItem('username') || '';

    const medals = ['🥇','🥈','🥉'];
    const podiumClass = ['gold','silver','bronze'];

    async function load() {
        const res = await fetch('/api/users/leaderboard', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.status === 401) { localStorage.clear(); location.href = '/index.html'; return; }
        const data = await res.json();
        if (!data || !data.length) {
            document.getElementById('loadView').style.display = 'none';
            document.getElementById('mainView').style.display = 'block';
            document.getElementById('tableBody').innerHTML = '<div class="empty">No players yet — be the first!</div>';
            return;
        }

        // --- Podium (top 3) ---
        const podiumEl = document.getElementById('podium');
        const top3 = data.slice(0, 3);
        // Reorder for visual podium: 2nd | 1st | 3rd
        const order = top3.length === 3 ? [1, 0, 2] : top3.length === 2 ? [1, 0] : [0];
        podiumEl.style.gridTemplateColumns = `repeat(${order.length},1fr)`;

        podiumEl.innerHTML = order.map(i => {
            const p = top3[i];
            if (!p) return '';
            const isMe = p.username === username;
            return `
            <div class="podium-card ${podiumClass[i]}">
                <div class="podium-rank">${medals[i]}</div>
                <div class="podium-name ${isMe ? 'you' : ''}">${p.username}</div>
                <div class="podium-score ${podiumClass[i]}">${p.totalScore.toLocaleString()}</div>
                <div class="podium-games">${p.gamesPlayed} game${p.gamesPlayed !== 1 ? 's' : ''}</div>
                ${isMe ? '<div class="podium-you-badge">You</div>' : ''}
            </div>`;
        }).join('');

        // --- Full table ---
        const SHOW = 50;
        const visible = data.slice(0, SHOW);
        const tableBody = document.getElementById('tableBody');

        tableBody.innerHTML = visible.map((p, idx) => {
            const isMe = p.username === username;
            const medal = p.rank <= 3 ? `<span class="rank-medal">${medals[p.rank-1]}</span>` : '';
            const initials = p.username.slice(0, 2).toUpperCase();
            return `<div class="table-row ${isMe ? 'me' : ''}" style="animation-delay:${idx * 0.03}s">
                <div class="rank-cell">
                    ${medal || `<span class="rank-num">${p.rank}</span>`}
                </div>
                <div class="user-cell">
                    <div class="avatar">${initials}</div>
                    <span class="username">${p.username}${isMe ? '<span class="you-tag">You</span>' : ''}</span>
                </div>
                <div class="score-cell">${p.totalScore.toLocaleString()}</div>
                <div class="games-cell">${p.gamesPlayed}</div>
            </div>`;
        }).join('');

        // --- My rank banner if outside top SHOW ---
        const myEntry = data.find(p => p.username === username);
        if (myEntry && myEntry.rank > SHOW) {
            document.getElementById('myRankBanner').style.display = 'flex';
            document.getElementById('myRankInfo').textContent =
                `#${myEntry.rank} · ${myEntry.totalScore.toLocaleString()} pts · ${myEntry.gamesPlayed} games`;
        }

        document.getElementById('loadView').style.display = 'none';
        document.getElementById('mainView').style.display = 'block';
    }

    function logout() { localStorage.clear(); location.href = '/index.html'; }

    load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Know-It-All</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0a0a0f; --surface:#12121a; --border:#1e1e2e; --accent:#7c5cfc; --accent2:#c084fc; --text:#e2e0ff; --muted:#6b6a8a; --success:#4ade80; --error:#f87171; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .glow { position:fixed; inset:0; pointer-events:none; background:radial-gradient(ellipse 80% 60% at 50% -10%, rgba(124,92,252,0.18) 0%, transparent 70%); }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:48px 40px; width:420px; animation:up 0.4s ease; }
        @keyframes up { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        .logo { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center; margin-bottom:4px; }
        .sub { text-align:center; color:var(--muted); font-size:13px; margin-bottom:28px; }
        .tabs { display:flex; background:var(--bg); border-radius:10px; padding:4px; margin-bottom:24px; }
        .tab { flex:1; text-align:center; padding:9px; border-radius:7px; cursor:pointer; font-size:14px; font-weight:500; color:var(--muted); transition:all 0.2s; }
        .tab.active { background:var(--accent); color:#fff; }
        .field { margin-bottom:14px; }
        label { display:block; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px; }
        input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--text); font-size:15px; font-family:inherit; outline:none; transition:border-color 0.2s; }
        input:focus { border-color:var(--accent); }
        .btn { width:100%; padding:13px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:11px; color:#fff; font-size:15px; font-weight:700; font-family:'Syne',sans-serif; cursor:pointer; margin-top:6px; transition:opacity 0.2s,transform 0.15s; }
        .btn:hover { opacity:0.9; transform:translateY(-1px); }
        .msg { margin-top:12px; padding:9px 13px; border-radius:8px; font-size:13px; text-align:center; display:none; }
        .msg.error { background:rgba(248,113,113,0.1); color:var(--error); border:1px solid rgba(248,113,113,0.2); display:block; }
        .msg.success { background:rgba(74,222,128,0.1); color:var(--success); border:1px solid rgba(74,222,128,0.2); display:block; }
    </style>
</head>
<body>
<div class="glow"></div>
<div class="card">
    <div class="logo">⚡ Know-It-All</div>
    <div class="sub">AI-powered quiz. How much do you know?</div>
    <div class="tabs">
        <div class="tab active" id="tabLogin" onclick="switchTab('login')">Login</div>
        <div class="tab" id="tabReg" onclick="switchTab('register')">Register</div>
    </div>

    <div id="loginForm">
        <div class="field"><label>Username</label><input id="lUser" type="text" placeholder="username" autocomplete="username"/></div>
        <div class="field"><label>Password</label><input id="lPass" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
        <button class="btn" onclick="login()">Sign In →</button>
    </div>

    <div id="regForm" style="display:none">
        <div class="field"><label>Username</label><input id="rUser" type="text" placeholder="choose a username"/></div>
        <div class="field"><label>Email</label><input id="rEmail" type="email" placeholder="you@email.com"/></div>
        <div class="field"><label>Password</label><input id="rPass" type="password" placeholder="at least 8 characters"/></div>
        <button class="btn" onclick="register()">Create Account →</button>
    </div>

    <div class="msg" id="msg"></div>
</div>

<script>
    if (localStorage.getItem('token')) location.href = '/dashboard.html';

    function switchTab(tab) {
      document.getElementById('tabLogin').className = 'tab' + (tab==='login'?' active':'');
      document.getElementById('tabReg').className   = 'tab' + (tab==='register'?' active':'');
      document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
      document.getElementById('regForm').style.display   = tab==='register'?'block':'none';
      msg('','');
    }

    function msg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg' + (type?' '+type:'');
    }

    async function login() {
      const username = document.getElementById('lUser').value.trim();
      const password = document.getElementById('lPass').value;
      if (!username || !password) return msg('Please fill in all fields.', 'error');
      try {
        const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username, password}) });
        const data = await res.json();
        if (!res.ok) return msg(data.error || 'Login failed', 'error');
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        localStorage.setItem('userId', data.userId);
        location.href = '/dashboard.html';
      } catch { msg('Cannot reach server.', 'error'); }
    }

    async function register() {
      const username = document.getElementById('rUser').value.trim();
      const email    = document.getElementById('rEmail').value.trim();
      const password = document.getElementById('rPass').value;
      if (!username || !email || !password) return msg('Please fill in all fields.', 'error');
      if (password.length < 8) return msg('Password must be at least 8 characters.', 'error');
      try {
        const res = await fetch('/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username, email, password}) });
        const data = await res.json();
        if (!res.ok) return msg(data.error || 'Registration failed', 'error');
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        localStorage.setItem('userId', data.userId);
        location.href = '/dashboard.html';
      } catch { msg('Cannot reach server.', 'error'); }
    }

    document.addEventListener('keydown', e => { if (e.key==='Enter') { const onLogin = document.getElementById('loginForm').style.display!=='none'; onLogin ? login() : register(); } });
</script>
</body>
</html>
